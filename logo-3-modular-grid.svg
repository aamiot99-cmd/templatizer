<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Templatizer logo — modular grid">
  <defs>
    <linearGradient id="g3a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="g3b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FED7AA"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
  </defs>

  <!-- Mark: 3x3 modular grid where one cell is the "master template" filled, others are empty/dashed -->
  <g transform="translate(28,28)">
    <!-- empty / dashed cells -->
    <g fill="none" stroke="#FB923C" stroke-width="2.5" stroke-dasharray="4 4" opacity="0.7">
      <rect x="0"  y="0"  width="32" height="32" rx="6"/>
      <rect x="36" y="0"  width="32" height="32" rx="6"/>
      <rect x="72" y="0"  width="32" height="32" rx="6"/>
      <rect x="0"  y="36" width="32" height="32" rx="6"/>
      <rect x="72" y="36" width="32" height="32" rx="6"/>
      <rect x="0"  y="72" width="32" height="32" rx="6"/>
      <rect x="36" y="72" width="32" height="32" rx="6"/>
      <rect x="72" y="72" width="32" height="32" rx="6"/>
    </g>
    <!-- master cell -->
    <rect x="36" y="36" width="32" height="32" rx="6" fill="url(#g3a)"/>
    <!-- spark indicating it propagates -->
    <g stroke="#F97316" stroke-width="2" stroke-linecap="round" opacity="0.55">
      <line x1="52" y1="24" x2="52" y2="14"/>
      <line x1="52" y1="80" x2="52" y2="90"/>
      <line x1="24" y1="52" x2="14" y2="52"/>
      <line x1="80" y1="52" x2="90" y2="52"/>
    </g>
    <!-- inner dot -->
    <circle cx="52" cy="52" r="5" fill="#FFF7ED"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160,0)">
    <text x="0" y="92" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="800" fill="#1F2937" letter-spacing="-1.5">Templatizer</text>
    <text x="2" y="116" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#EA580C" letter-spacing="2.5">ONE SOURCE · INFINITE OUTPUTS</text>
  </g>
</svg>
