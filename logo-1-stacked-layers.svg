<svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Templatizer logo — stacked layers">
  <defs>
    <linearGradient id="g1a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="g1b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="g1c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>

  <!-- Mark: three offset template layers -->
  <g transform="translate(28,32)">
    <rect x="0"  y="40" width="78" height="56" rx="10" fill="url(#g1c)"/>
    <rect x="12" y="22" width="78" height="56" rx="10" fill="url(#g1b)"/>
    <rect x="24" y="4"  width="78" height="56" rx="10" fill="url(#g1a)"/>
    <!-- mini content lines on top layer -->
    <rect x="36" y="18" width="42" height="5" rx="2.5" fill="#FFFFFF" opacity="0.95"/>
    <rect x="36" y="29" width="30" height="5" rx="2.5" fill="#FFFFFF" opacity="0.7"/>
    <rect x="36" y="40" width="36" height="5" rx="2.5" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160,0)">
    <text x="0" y="98" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#1E1B4B" letter-spacing="-1.2">Templatizer</text>
    <text x="2" y="120" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="500" fill="#6366F1" letter-spacing="3">LAYER · REUSE · SHIP</text>
  </g>
</svg>
