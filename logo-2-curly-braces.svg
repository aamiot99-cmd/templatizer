<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Templatizer logo — curly braces T">
  <defs>
    <linearGradient id="g2a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Mark: {{ T }} -->
  <g transform="translate(24,28)" fill="none" stroke="url(#g2a)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- left curly brace -->
    <path d="M34 8 C18 8 22 30 14 52 C22 74 18 96 34 96"/>
    <!-- right curly brace -->
    <path d="M122 8 C138 8 134 30 142 52 C134 74 138 96 122 96"/>
  </g>

  <!-- The T inside braces -->
  <g transform="translate(24,28)">
    <rect x="50" y="28" width="56" height="10" rx="3" fill="#0F172A"/>
    <rect x="73" y="28" width="10" height="48" rx="3" fill="#0F172A"/>
    <!-- Tiny accent dot, like a cursor -->
    <circle cx="78" cy="84" r="3.2" fill="#0EA5E9">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark -->
  <g transform="translate(180,0)">
    <text x="0" y="98" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="40" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Templatizer</text>
    <text x="2" y="120" font-family="'JetBrains Mono', 'Menlo', monospace" font-size="11" font-weight="500" fill="#0EA5E9" letter-spacing="2">{{ build · once · render · anywhere }}</text>
  </g>
</svg>
