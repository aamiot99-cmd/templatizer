.lm-footer-links{background:#fff;padding:14px 40px;display:flex;gap:24px;justify-content:center;border-top:1px solid #e8eaed}

.lm-footer-links span:hover{color:var(--P)}
`,
render(cfg){
  const n=cfg.name||'Intranet';
  const h=new Date().getHours();
  const gr=h<12?'Good morning':h<18?'Good afternoon':'Good evening';
  const logo=cfg.logo?`<img src="${cfg.logo}" alt="" style="height:52px;max-width:160px;object-fit:contain">`:`<span class="lm-gtb-brand">${n}</span>`;
  const defaults=PLATFORM_DEFAULTS_INTRANET['lumapps'];
  const priority=(cfg.blocks?.priority?.length?cfg.blocks.priority:defaults.priority);
  const secondary=(cfg.blocks?.secondary?.length?cfg.blocks.secondary:defaults.secondary);
  // Helper: grid columns for a pair of blocks based on their size
  const gridCols=(a,b)=>{
    const sa=BLOCKS.lumapps[a]?.size, sb=BLOCKS.lumapps[b]?.size;
    if(sa==='wide'&&sb==='narrow') return '2fr 1fr';
    if(sa==='narrow'&&sb==='wide') return '1fr 2fr';
    return '1fr 1fr';
  };
  let content='';
  // 1st priority block: full width
  if(priority[0] && BLOCKS.lumapps[priority[0]]) content+=BLOCKS.lumapps[priority[0]].large(cfg);
  // 2nd and 3rd priority blocks: side by side with adaptive columns
  const priRest=priority.slice(1).filter(id=>BLOCKS.lumapps[id]);
  if(priRest.length===1){
    content+=BLOCKS.lumapps[priRest[0]].large(cfg);
  } else if(priRest.length>=2){
    const cols=gridCols(priRest[0],priRest[1]);
    content+=`<div style="display:grid;grid-template-columns:${cols};gap:16px">${priRest.slice(0,2).map(id=>BLOCKS.lumapps[id].large(cfg)).join('')}</div>`;
  }
  // Secondary blocks: pair them with adaptive columns
  const secIds=secondary.filter(id=>BLOCKS.lumapps[id]);
  for(let i=0;i<secIds.length;i++){
    if(i+1<secIds.length){
      const cols=gridCols(secIds[i],secIds[i+1]);
      content+=`<div style="display:grid;grid-template-columns:${cols};gap:16px">${BLOCKS.lumapps[secIds[i]].compact(cfg)}${BLOCKS.lumapps[secIds[i+1]].compact(cfg)}</div>`;
      i++;
    } else {
      content+=BLOCKS.lumapps[secIds[i]].compact(cfg);
    }
  }
  const I={
    grid:`<svg width="17" height="17" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>`,
    play:`<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`,
    bell:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
    gear:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
    help:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor" stroke="none"/></svg>`,
    home:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>`,
    dir:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    spark:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17.3l-6.2 4.1 2.4-7.4L2 9.4h7.6z"/></svg>`,
  };
  return `
<div class="lm-gtb">
  <div class="lm-gtb-inner">
    <div class="lm-gtb-logo">${logo}</div>
    <div class="lm-gtb-search">
      <input placeholder="Rechercher…">
      <div class="lm-gtb-search-btn">🔍</div>
    </div>
    <div class="lm-gtb-right">
      <div class="lm-create-btn">＋ Create</div>
      <div class="lm-gtb-icon" title="Apps">${I.grid}</div>
      <div class="lm-gtb-icon" title="Media">${I.play}</div>
      <div class="lm-gtb-icon" title="Notifications">${I.bell}<div class="lm-gtb-badge"></div></div>
      <div class="lm-gtb-av">ML</div>
      <div class="lm-gtb-icon" title="Settings">${I.gear}</div>
      <div class="lm-help-btn" title="Help">?</div>
    </div>
  </div>
</div>
<nav class="lm-nav">
  <div class="lm-nav-inner">
    <div class="lm-nav-item active">${I.home}</div>
    ${['NEWS','COMMUNITIES ▾','PEOPLE','EVENTS ▾','DEPARTMENTS ▾'].map(x=>`<div class="lm-nav-item">${x}</div>`).join('')}
    <div class="lm-nav-item" title="Directory">${I.dir}</div>
    <div class="lm-nav-item" title="AI Assistant">${I.spark}</div>
  </div>
</nav>
<div class="lm-shell">
<div class="lm-center">
  <main class="lm-main">
    <div class="lm-greeting">
      <div class="lm-greeting-chip"><div class="lm-greeting-dot"></div>${gr}</div>
      <h1 class="lm-greeting-h1">Welcome, <em>Marie-Laure</em>.</h1>
      <p class="lm-greeting-sub">Stay informed, connect with your team and access your tools — right here on ${n}.</p>
    </div>
    ${content}
  </main>
</div>
<footer class="lm-footer">
  <div class="lm-footer-brand">${cfg.logo?`<img src="${cfg.logo}" alt="${n}">`:`<span class="lm-footer-brand-txt">${n}</span>`}</div>
  <div class="lm-footer-links"><span>Mentions légales</span><span>Politique de confidentialité</span><span>Cookies</span><span>Nous contacter</span></div>
</footer>
</div>`;
}
},

// ═══════════════════════════════════════════════════════════════════════════
// SHAREPOINT — Spec: M365 Suite bar (dark, 48px) + App bar (50px left icons)
// + Site header (white, logo+name+nav) + Secondary toolbar (+New, Edit…)
// + Horizontal site nav + Alternating white/brand sections + Web parts:
// Hero Tiles (focal left + 2×2 right), News, Quick Links (button style on
// brand-color bg), Events (3-col cards), People, Text+Image 2-col
// ═══════════════════════════════════════════════════════════════════════════
sharepoint:{
name:'SharePoint',
css:`
body.t-sp{background:#f3f2f1;font-family:'Segoe UI',system-ui,sans-serif}
/* ── M365 Suite Bar ── */
.sp-suitebar{position:fixed;top:0;left:0;right:0;height:48px;background:var(--S);display:flex;align-items:center;z-index:400}
.sp-sb-left{display:flex;align-items:center;flex-shrink:0}
.sp-sb-center{flex:1;display:flex;justify-content:center;padding:0 16px}
.sp-sb-right{display:flex;align-items:center;flex-shrink:0}
.sp-waffle{width:48px;height:48px;display:grid;place-items:center;cursor:pointer;color:rgba(255,255,255,.85);flex-shrink:0}
.sp-waffle:hover{background:rgba(255,255,255,.1)}
.sp-suite-logo{width:28px;height:28px;border-radius:4px;background:rgba(255,255,255,.9);display:grid;place-items:center;flex-shrink:0;overflow:hidden}
.sp-suite-name{font-size:15px;font-weight:600;color:#fff;padding:0 20px 0 8px;white-space:nowrap}
.sp-suite-search{display:flex;align-items:center;gap:8px;background:#fff;border-radius:2px;padding:0 12px;height:32px;width:100%;max-width:520px}
.sp-suite-search input{flex:1;background:none;border:none;outline:none;color:#323130;font-size:13px;font-family:inherit}
.sp-suite-search input::placeholder{color:#605e5c}
.sp-suite-btn{width:40px;height:48px;display:grid;place-items:center;color:rgba(255,255,255,.85);cursor:pointer;position:relative}
.sp-suite-btn:hover{background:rgba(255,255,255,.1)}
.sp-suite-av{width:32px;height:32px;border-radius:50%;background:var(--P);color:#fff;font-weight:600;font-size:12px;display:grid;place-items:center;margin:0 10px 0 4px;cursor:pointer}
/* ── App Bar ── */
.sp-appbar{position:fixed;top:48px;left:0;bottom:0;width:50px;background:#fff;border-right:1px solid #e0e0e0;z-index:300;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px}
.sp-ab-btn{width:36px;height:36px;border-radius:4px;display:grid;place-items:center;color:#605e5c;cursor:pointer;transition:background .15s}
.sp-ab-btn:hover{background:#f3f2f1}
.sp-ab-btn.active{color:var(--P)}
/* ── Shell ── */
.sp-shell{padding-top:48px;padding-left:50px;min-height:100vh}
/* ── Site Header ── */
.sp-siteheader{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;align-items:center;gap:12px;height:60px}
.sp-site-logo{width:40px;height:40px;border-radius:4px;overflow:hidden;display:grid;place-items:center;flex-shrink:0}
.sp-site-logo img{width:100%;height:100%;object-fit:contain}
.sp-site-logo-txt{color:var(--P);font-size:18px;font-weight:900}
.sp-site-name{font-size:17px;font-weight:600;color:#323130;white-space:nowrap}
.sp-sitenav{background:#fff;padding:0 20px;display:flex;align-items:center;height:44px;gap:0}
.sp-snav-item{height:44px;display:flex;align-items:center;padding:0 14px;font-size:14px;color:#323130;cursor:pointer;position:relative;white-space:nowrap}
.sp-snav-item:hover{background:#f3f2f1}
.sp-snav-item.active{font-weight:600;color:#000}
.sp-snav-item.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--P)}
.sp-snav-right{margin-left:auto;display:flex;align-items:center}
.sp-snav-follow{font-size:13px;color:#323130;display:flex;align-items:center;gap:5px;cursor:pointer}
/* ── Toolbar ── */
.sp-toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:0 20px;display:flex;align-items:center;height:40px;gap:4px}
.sp-tb-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:2px;font-size:13px;color:#323130;cursor:pointer;font-family:inherit}
.sp-tb-btn:hover{background:#f3f2f1}
.sp-tb-btn.primary{color:var(--P)}
.sp-tb-sep{width:1px;height:20px;background:#e0e0e0;margin:0 4px}
.sp-tb-right{margin-left:auto;display:flex;gap:4px;font-size:12px;color:#605e5c;align-items:center}
/* ── Sections ── */
.sp-sec-white{background:#fff}
.sp-sec-gray{background:#f3f2f1;padding:20px 16px 40px}
.sp-sec-inner{display:grid;grid-template-columns:1fr 300px;gap:16px;align-items:start}
.sp-sec-main{display:flex;flex-direction:column;gap:16px}
.sp-sec-gray .sp-section{background:#fff;border-top:none;box-shadow:0 1px 3px rgba(0,0,0,.06)}
/* ── Hero: 2 equal photo tiles ── */
.sp-hero2{display:grid;grid-template-columns:1fr 1fr;height:280px}
.sp-h2tile{position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:flex-end}
.sp-h2tile-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.12}
.sp-h2tile-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.1) 60%)}
.sp-h2tile-txt{position:relative;padding:18px 20px;font-size:17px;font-weight:700;color:#fff;line-height:1.25}
/* ── Content sections ── */
.sp-section{padding:28px 32px;border-top:1px solid #edebe9}
.sp-section:first-child{border-top:none}
.sp-wp-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sp-wp-title{font-size:17px;font-weight:600;color:#323130}
.sp-wp-link{font-size:13px;color:var(--P);cursor:pointer}
/* ── 3-col category cards ── */
.sp-cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sp-cat-card{cursor:pointer}
.sp-cat-img{height:130px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:10px;border-radius:2px}
.sp-cat-title{font-size:14px;font-weight:600;color:var(--P);text-decoration:underline;margin-bottom:5px}
.sp-cat-desc{font-size:13px;color:#605e5c;line-height:1.45}
/* ── 2-col topic links ── */
.sp-topics-wrap{display:grid;grid-template-columns:1fr 1fr;gap:24px;background:#f3f2f1;padding:22px 20px}
.sp-topics-title{font-size:16px;font-weight:600;color:#323130;margin-bottom:12px}
.sp-topic-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #e0e0e0}
.sp-topic-item:last-child{border-bottom:none}
.sp-topic-ico{width:28px;height:28px;flex-shrink:0;display:grid;place-items:center;font-size:16px;color:#605e5c}
.sp-topic-name{font-size:13px;font-weight:600;color:#323130;margin-bottom:2px}
.sp-topic-desc{font-size:12px;color:#605e5c;line-height:1.35}
/* ── We're here to help ── */
.sp-help-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sp-help-card{display:flex;flex-direction:column;align-items:center;padding:16px 10px;gap:8px;cursor:pointer}
.sp-help-card:hover .sp-help-name{color:var(--P)}
.sp-help-av{width:44px;height:44px;border-radius:50%;background:#e0e0e0;display:grid;place-items:center;font-size:20px}
.sp-help-name{font-size:13px;color:#323130;text-align:center}
/* ── CTA Banner ── */
.sp-cta-banner{display:flex;align-items:center;justify-content:space-between;padding:28px 32px;background:linear-gradient(135deg,#d4e8f5 0%,#b8d9ec 100%);position:relative;overflow:hidden}
.sp-cta-body{z-index:1}
.sp-cta-title{font-size:20px;font-weight:700;color:#323130;margin-bottom:10px}
.sp-cta-btn{padding:9px 20px;background:var(--S);color:#fff;border:none;border-radius:2px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.sp-cta-deco{position:absolute;right:60px;font-size:120px;opacity:.18;line-height:1}
/* ── News + Celebrations 2-col ── */
.sp-nc2{display:grid;grid-template-columns:3fr 2fr;gap:20px}
.sp-news-wp{background:#f3f2f1;border-radius:2px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;gap:8px}
.sp-news-ico{font-size:40px;color:#c0c0c0}
.sp-news-empty{font-size:13px;color:#a19f9d}
.sp-celeb-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sp-celeb-card{background:#f3f2f1;border-radius:2px;overflow:hidden;cursor:pointer}
.sp-celeb-img{height:90px;display:flex;align-items:center;justify-content:center;font-size:36px}
.sp-celeb-lbl{padding:8px 10px;font-size:13px;font-weight:600;color:#323130}
/* ── Most recent documents ── */
.sp-doc-wp{background:#f3f2f1;border-radius:2px;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;gap:6px}
.sp-doc-ico{font-size:36px;color:#c0c0c0}
.sp-doc-empty{font-size:13px;color:#a19f9d}
.sp-doc-learn{font-size:12px;color:var(--P);cursor:pointer;margin-top:4px}
/* ── Right Sidebar ── */
.sp-rside{background:var(--S);padding:20px 16px;align-self:stretch}
.sp-rs-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:14px}
.sp-rs-faq{display:flex;flex-direction:column;gap:0}
.sp-rs-faq-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.12);cursor:pointer}
.sp-rs-faq-item:last-child{border-bottom:none}
.sp-rs-faq-ico{flex-shrink:0;color:rgba(255,255,255,.7);display:flex;align-items:center}
.sp-rs-faq-lbl{font-size:13px;color:rgba(255,255,255,.9);line-height:1.35}
.sp-rs-faq-more{font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;margin-top:12px;display:flex;align-items:center;gap:5px}
.sp-rs-divider{height:1px;background:rgba(255,255,255,.15);margin:18px 0}
.sp-rs-cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sp-rs-cal-title{font-size:14px;font-weight:700;color:#fff}
.sp-rs-cal-see{font-size:12px;color:rgba(255,255,255,.6);cursor:pointer}
.sp-rs-cal-add{font-size:12px;color:rgba(255,255,255,.6);cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:4px}
.sp-rs-ev{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.1);cursor:pointer}
.sp-rs-ev:last-child{border-bottom:none}
.sp-rs-ev-date{width:42px;flex-shrink:0;text-align:center;border-radius:3px;overflow:hidden}
.sp-rs-ev-month{background:var(--P);padding:2px 0;font-size:9px;font-weight:700;text-transform:uppercase;color:#fff;letter-spacing:.5px}
.sp-rs-ev-day{background:rgba(255,255,255,.1);font-size:18px;font-weight:700;color:#fff;line-height:1.4}
.sp-rs-ev-info{flex:1}
.sp-rs-ev-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sp-rs-ev-meta{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
`,
render(cfg){

        <div class="sp-rs-faq-item"><div class="sp-rs-faq-ico">${i}</div><div class="sp-rs-faq-lbl">${l}</div></div>`).join('')}

    </div>

</div>`;

// ═══════════════════════════════════════════════════════════════════════════
// JALIOS — Spec: NO left sidebar; white top bar with Flash Info pill + centered
// search; 2-column layout ~35% left / ~65% right; widgets with title bar + ⋮
// + pagination; blocks: Quick Access, Recent Docs, My Communities, Flash Info
// (teal bg), Activity Feed (tabbed), Online Presence, Agenda, Blog, Wiki
// ═══════════════════════════════════════════════════════════════════════════
jalios:{
name:'Jalios',
css:`
body.t-jl{background:#f0f2f5;font-family:'Open Sans',system-ui,sans-serif}
.jl-topbar{position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:2px solid var(--P);z-index:300;display:flex;align-items:center;padding:0 20px;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.jl-logo{display:flex;align-items:center;gap:10px;padding-right:16px;border-right:1px solid #e5e7eb;flex-shrink:0}
.jl-logo img{height:26px;max-width:100px;object-fit:contain}
.jl-logo-txt{font-size:16px;font-weight:800;color:var(--S);letter-spacing:-.3px}
.jl-flash{display:flex;align-items:center;gap:6px;background:color-mix(in srgb,#00bcd4 15%,#fff);border:1px solid #00bcd4;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:#007c8a;cursor:pointer;white-space:nowrap;flex-shrink:0}
.jl-flash-dot{width:7px;height:7px;border-radius:50%;background:#00bcd4}
.jl-search{flex:1;max-width:400px;margin:0 auto;display:flex;align-items:center;gap:6px;background:#f9fafb;border:1px solid #d1d5db;border-radius:20px;padding:0 12px;height:34px}
.jl-search input{background:none;border:none;outline:none;font-size:13px;color:#374151;font-family:inherit;flex:1}
.jl-search input::placeholder{color:#9ca3af}
.jl-topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto}
.jl-tb-icon{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#6b7280;cursor:pointer;font-size:16px;position:relative}
.jl-tb-icon:hover{background:#f3f4f6}
.jl-tb-badge{position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--P);border-radius:50%;border:1.5px solid #fff}
.jl-tb-avatar{width:32px;height:32px;border-radius:50%;background:var(--P);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;cursor:pointer;border:2px solid #e5e7eb}
/* Greeting bar */
.jl-greeting-bar{background:var(--S);color:#fff;padding:8px 20px;font-size:12px;display:flex;align-items:center;gap:8px}
.jl-greeting-name{font-weight:700}
.jl-greeting-date{color:rgba(255,255,255,.55);margin-left:auto}
/* Shell */
.jl-shell{padding-top:54px;display:grid;grid-template-columns:35% 65%;min-height:100vh;gap:0}
/* Widget style shared */
.jl-widget{background:#fff;border:1px solid #e5e7eb;border-radius:3px;margin-bottom:14px;overflow:hidden}
.jl-widget-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.jl-widget-hd-left{display:flex;align-items:center;gap:8px}
.jl-widget-hd-ico{font-size:14px}
.jl-widget-hd-title{font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.5px}
.jl-widget-hd-right{display:flex;align-items:center;gap:8px}
.jl-widget-hd-menu{font-size:14px;color:#9ca3af;cursor:pointer}
.jl-widget-body{padding:12px 14px}
.jl-widget-pagination{display:flex;align-items:center;justify-content:center;gap:4px;padding:8px;border-top:1px solid #f3f4f6}
.jl-page-btn{width:24px;height:24px;border-radius:2px;display:grid;place-items:center;font-size:11px;color:#6b7280;cursor:pointer;border:1px solid #e5e7eb}
.jl-page-btn.active{background:var(--P);color:#fff;border-color:var(--P)}
/* Left column */
.jl-left{padding:14px 10px 14px 14px}
/* Quick Access */
.jl-qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.jl-qa-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:4px;cursor:pointer;border:1px solid #f3f4f6}
.jl-qa-item:hover{border-color:var(--P);background:var(--P10)}
.jl-qa-ico{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:18px}
.jl-qa-lbl{font-size:10px;color:#4b5563;font-weight:600;text-align:center}
.jl-qa-btn{width:100%;margin-top:8px;padding:7px;border:1px solid #e5e7eb;border-radius:2px;font-size:12px;font-weight:600;color:#374151;text-align:center;cursor:pointer;background:#fff}
.jl-qa-btn:hover{border-color:var(--P);color:var(--P)}
/* Recent Docs */
.jl-doc-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
.jl-doc-item:last-child{border-bottom:none}
.jl-doc-ico{font-size:18px;flex-shrink:0}
.jl-doc-name{font-size:12px;font-weight:600;color:#111827;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.jl-doc-time{font-size:10px;color:#9ca3af;white-space:nowrap}
/* My Communities */
.jl-communities-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jl-comm-card{border:1px solid #e5e7eb;border-radius:2px;overflow:hidden;cursor:pointer}
.jl-comm-card:hover{border-color:var(--P)}
.jl-comm-img{height:48px;display:flex;align-items:center;justify-content:center;font-size:22px}
.jl-comm-body{padding:6px 8px}
.jl-comm-name{font-size:11px;font-weight:700;color:#111827;margin-bottom:3px}
.jl-comm-tags{display:flex;gap:4px;flex-wrap:wrap}
.jl-comm-tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:2px}
.jl-comm-tag.public{background:#dcfce7;color:#166534}
.jl-comm-tag.secret{background:#fee2e2;color:#991b1b}
.jl-comm-tag.type{background:#f3f4f6;color:#6b7280}
/* Online presence */
.jl-online-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:12px;color:#374151}
.jl-online-item:last-child{border-bottom:none}
.jl-online-av{width:24px;height:24px;border-radius:50%;font-size:9px;font-weight:700;color:#fff;display:grid;place-items:center;flex-shrink:0}
.jl-online-name{flex:1}
.jl-online-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* Right column */
.jl-right{padding:14px 14px 14px 4px}
/* Flash Info (teal) */
.jl-flash-info{background:#00bcd4;border-radius:3px;padding:16px 18px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer}
.jl-flash-info::after{content:'1 / 2';position:absolute;bottom:10px;right:14px;font-size:10px;color:rgba(255,255,255,.6);font-weight:600}
.jl-fi-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:6px}
.jl-fi-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.3}
.jl-fi-body{font-size:13px;color:rgba(255,255,255,.85);line-height:1.5;margin-bottom:10px}
.jl-fi-footer{display:flex;align-items:center;justify-content:space-between}
.jl-fi-date{font-size:11px;color:rgba(255,255,255,.6)}
.jl-fi-read{font-size:12px;font-weight:700;color:#fff;text-decoration:underline;cursor:pointer}
/* Activity Feed */
.jl-feed-tabs{display:flex;border-bottom:1px solid #e5e7eb;background:#f9fafb}
.jl-feed-tab{padding:9px 14px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.jl-feed-tab.active{color:var(--P);border-bottom-color:var(--P);background:#fff}
.jl-feed-tab:hover:not(.active){color:#374151}
.jl-activity-feed{display:flex;flex-direction:column;gap:0}
.jl-act-item{display:flex;gap:10px;padding:13px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer}
.jl-act-item:last-child{border-bottom:none}
.jl-act-item:hover{background:#fafafa}
.jl-act-av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.jl-act-author{font-size:13px;font-weight:700;color:#111827;margin-bottom:1px}
.jl-act-action{font-weight:400;color:#6b7280}
.jl-act-text{font-size:12px;color:#374151;line-height:1.5;margin-bottom:5px}
/* Embedded event card */
.jl-act-event{background:#f9fafb;border:1px solid #e5e7eb;border-radius:3px;padding:10px 12px;margin-top:6px}
.jl-act-event-date{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--P);margin-bottom:3px}
.jl-act-event-title{font-size:12px;font-weight:700;color:#111827;margin-bottom:2px}
.jl-act-event-meta{font-size:11px;color:#6b7280}
.jl-act-time{font-size:10px;color:#9ca3af;margin-top:3px}
.jl-act-actions{display:flex;gap:12px;margin-top:6px}
.jl-act-btn{font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;background:none;border:none;font-family:inherit}
.jl-act-btn:hover{color:var(--P)}
/* Agenda widget */
.jl-agenda{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.jl-agenda-day-hd{text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:#9ca3af;padding:4px 0}
.jl-agenda-day{min-height:48px;border:1px solid #f3f4f6;border-radius:2px;padding:4px}
.jl-agenda-day-num{font-size:12px;font-weight:600;color:#374151;margin-bottom:2px}
.jl-agenda-day.today .jl-agenda-day-num{background:var(--P);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px}
.jl-agenda-event{font-size:9px;background:var(--P10);color:var(--P);border-radius:2px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
/* "Voir plus" link */
.jl-voir-plus{text-align:center;padding:6px;border-top:1px solid #f3f4f6}
.jl-voir-plus a{font-size:11px;color:var(--P);font-weight:600;cursor:pointer}
`,
render(cfg){

  const secondary=(cfg.blocks?.secondary?.length?cfg.blocks.secondary:defaults.secondary);
  let content='';
  for(const id of priority){if(BLOCKS.jalios[id])content+=BLOCKS.jalios[id].large(cfg);}
  for(const id of secondary){if(BLOCKS.jalios[id])content+=BLOCKS.jalios[id].compact(cfg);}
  return `

</div>

</div>
<div class="jl-shell">
  <div class="jl-left">
    <!-- Quick Access -->

      <div class="jl-widget-hd">
        <div class="jl-widget-hd-left"><span class="jl-widget-hd-ico">⚡</span><span class="jl-widget-hd-title">Accès rapide</span></div>
        <div class="jl-widget-hd-right"><span class="jl-widget-hd-menu">⋮</span></div>
      </div>
      <div class="jl-widget-body">
        <div class="jl-qa-grid">
          ${[['⭐','#fef3e2','Favoris'],['📹','#f0f7ee','Vidéo call'],['✅','#e8f4fd','Tâches'],['🗑️','#fce8e8','Corbeille']].map(([i,bg,l])=>`<div class="jl-qa-item"><div class="jl-qa-ico" style="background:${bg}">${i}</div><div class="jl-qa-lbl">${l}</div></div>`).join('')}

  </div>
  <div class="jl-right">
    ${content}
  </div>
</div>`;

// ═══════════════════════════════════════════════════════════════════════════
// JINT — Spec: 60px icon-only left sidebar; top bar with logo+name+horizontal
// nav (7 items)+search+icons; full-width content sections: Hero Banner,
// News/Actualités (featured large + smaller cards), Editorial Cards (3-col,
// dark overlay, CTA), CTA Banner (full-width colored divider), Social Feed +
// People Contacts 2-col, Applications Launcher (carousel), Events List,
// Social Media Feed (3-col grid); diagonal yellow/gold decorative shapes
// ═══════════════════════════════════════════════════════════════════════════
jint:{
name:'Jint',
css:`
body.t-jt{background:#f3f2f1;font-family:'Segoe UI',system-ui,sans-serif}
/* ── M365 Suite Bar ── */
.jt-m365bar{position:fixed;top:0;left:0;right:0;height:54px;background:#000;z-index:500;display:flex;align-items:center}
.jt-m365-left{display:flex;align-items:center;flex-shrink:0}
.jt-m365-waffle{width:46px;height:54px;display:grid;place-items:center;color:#fff;cursor:pointer;flex-shrink:0}
.jt-m365-logo-wrap{display:flex;align-items:center;padding:0 14px;border-right:1px solid rgba(255,255,255,.15);height:54px}
.jt-m365-logo-wrap img{height:28px;max-width:120px;object-fit:contain}
.jt-m365-appname{font-size:14.5px;color:#fff;font-weight:600;padding-left:14px;white-space:nowrap}
.jt-m365-search{flex:1;max-width:520px;margin:0 auto;height:32px;background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:4px;display:flex;align-items:center;padding:0 12px;gap:10px;color:#605e5c;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.jt-m365-search input{flex:1;background:none;border:none;outline:none;font-size:13px;color:#1b1b1b;font-family:inherit}
.jt-m365-search input::placeholder{color:#605e5c}
.jt-m365-right{display:flex;align-items:center;padding-right:14px;flex-shrink:0;gap:6px}
.jt-m365-icon{width:36px;height:54px;display:grid;place-items:center;color:#fff;cursor:pointer;position:relative}
.jt-m365-icon:hover{background:rgba(255,255,255,.08)}
.jt-m365-help-q{font-size:19px;font-weight:400;line-height:1;font-family:'Segoe UI',system-ui,sans-serif}
.jt-m365-badge{position:absolute;top:11px;right:5px;width:7px;height:7px;background:#e8440a;border-radius:50%;border:1.5px solid #000}
.jt-m365-user{font-size:13.5px;color:#fff;font-weight:400;padding:0 10px 0 10px;white-space:nowrap}
.jt-m365-av{width:30px;height:30px;border-radius:50%;background:var(--P);color:#fff;font-size:11.5px;font-weight:700;display:grid;place-items:center;cursor:pointer;flex-shrink:0}
/* ── App Bar — thin white column, grouped pill ── */
.jt-appbar{position:fixed;top:48px;left:0;bottom:0;width:48px;background:#fff;z-index:400;display:flex;flex-direction:column;align-items:center;padding:14px 0}
.jt-ab-pill{background:var(--P);border-radius:12px;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.jt-ab-icon{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:rgba(255,255,255,.8);cursor:pointer;transition:all .15s}
.jt-ab-icon:hover{background:rgba(255,255,255,.15);color:#fff}
.jt-ab-icon.active{color:#fff;background:rgba(255,255,255,.12)}
/* ── Site Header — two-row layout ── */
.jt-siteheader{position:fixed;top:48px;left:48px;right:0;background:#fff;z-index:300;display:flex;flex-direction:column}
/* Row 1 : logo + title + visual banner */
.jt-sh-top{display:flex;align-items:center;height:76px;padding:0 0 0 20px;overflow:hidden}
.jt-sh-logo-wrap{flex-shrink:0;display:flex;align-items:center;gap:10px;padding-right:14px;z-index:1}
.jt-sh-logo-wrap img{height:42px;max-width:130px;object-fit:contain}
.jt-sh-brand{font-size:22px;font-weight:700;color:var(--S);letter-spacing:-.3px}
.jt-sh-title{font-size:17px;font-weight:700;color:#000;white-space:nowrap;padding-right:18px;border-right:2px solid #edebe9;flex-shrink:0;z-index:1}
.jt-sh-banner{flex:1;position:relative;align-self:stretch;overflow:hidden}
/* Separator */
.jt-sh-sep{height:1px;background:#edebe9}
/* Row 2 : navigation + actions */
.jt-sh-nav{display:flex;align-items:stretch;height:40px;padding:0 8px}
.jt-sh-nav-item{height:40px;display:flex;align-items:center;padding:0 14px;font-size:13.5px;color:#323130;cursor:pointer;position:relative;white-space:nowrap;gap:4px}
.jt-sh-nav-item:hover{background:#faf9f8}
.jt-sh-nav-item.active{font-weight:600;color:#000}
.jt-sh-nav-item.active::after{content:'';position:absolute;bottom:0;left:14px;right:14px;height:2.5px;background:var(--P);border-radius:2px 2px 0 0}
.jt-sh-right{margin-left:auto;flex-shrink:0;display:flex;align-items:center;gap:2px;padding-right:8px}
.jt-sh-action{font-size:12px;color:#605e5c;cursor:pointer;display:flex;align-items:center;gap:5px;padding:4px 10px;white-space:nowrap;border-radius:4px}
.jt-sh-action:hover{background:#f3f2f1}
.jt-sh-dropdown{display:none;position:absolute;top:100%;left:0;min-width:200px;background:#fff;border:1px solid #edebe9;border-radius:0 0 6px 6px;box-shadow:0 4px 12px rgba(0,0,0,.12);padding:6px 0;z-index:50}
.jt-sh-nav-item:hover>.jt-sh-dropdown{display:block}
.jt-sh-dropdown-item{padding:8px 16px;font-size:13px;color:#323130;cursor:pointer;white-space:nowrap}
.jt-sh-dropdown-item:hover{background:#f3f2f1}
/* ── Shell ── */
.jt-shell{padding-top:185px;padding-left:48px;min-height:100vh;background:#fff}
/* Section wrapper */
.jt-section{padding:32px 40px;max-width:1280px;margin:0 auto}
.jt-section-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:18px}
.jt-section-title{font-size:20px;font-weight:700;color:#111;letter-spacing:-.3px}
.jt-section-link{font-size:13px;font-weight:600;color:var(--P);cursor:pointer}
/* Blocks use inline styles — minimal shared classes only */
`,
render(cfg){
  const n=cfg.name||'Jint';
  const defaults=PLATFORM_DEFAULTS_INTRANET['jint'];
  const BGSEC=['#fff','#f3f2f1'];
  const inner='padding:0 40px;max-width:1280px;margin:0 auto';
  let si=0;
  const sec=(html)=>`<div style="background:${BGSEC[si++%2]};padding:28px 0"><div style="${inner}">${html}</div></div>`;

  // Width → grid fr unit. '2/3' = 2fr; everything else = 1fr.
  // The row's existing cells together determine the actual ratio.
  const wToFr = w => w === '2/3' ? '2fr' : '1fr';

  // Inline migration: legacy cfg with cfg.blocks but no cfg.layout → derive layout
  const migrateBlocksToLayoutInline = (blocks) => {
    const rows = [];
    const pri = (blocks && blocks.priority) || [];
    const sec2 = (blocks && blocks.secondary) || [];
    if(pri[0]) rows.push({ cells: [{ width:'full', widgetId:pri[0] }] });
    const priRest = pri.slice(1, 3);
    if(priRest.length === 2){
      rows.push({ cells: [
        { width:'1/2', widgetId:priRest[0] },
        { width:'1/2', widgetId:priRest[1] },
      ]});
    } else if(priRest.length === 1){
      rows.push({ cells: [{ width:'full', widgetId:priRest[0] }] });
    }
    for(let i=0; i<sec2.length; i+=2){
      if(i+1 < sec2.length){
        rows.push({ cells: [
          { width:'1/2', widgetId:sec2[i] },
          { width:'1/2', widgetId:sec2[i+1] },
        ]});
      } else {
        rows.push({ cells: [{ width:'full', widgetId:sec2[i] }] });
      }
    }
    return { rows };
  };

  // Resolve layout: cfg.layout > migrated cfg.blocks > defaults
  let rows;
  if(cfg.layout && Array.isArray(cfg.layout.rows) && cfg.layout.rows.length){
    rows = cfg.layout.rows;
  } else if(cfg.blocks && (cfg.blocks.priority?.length || cfg.blocks.secondary?.length)){
    rows = migrateBlocksToLayoutInline(cfg.blocks).rows;
  } else {
    rows = migrateBlocksToLayoutInline(defaults).rows;
  }

  let content='';
  for(const row of rows){
    // Skip rows with no widgets at all
    if(!row.cells.some(c => c.widgetId && BLOCKS.jint[c.widgetId])) continue;
    if(row.cells.length === 1){
      const c = row.cells[0];
      if(!c.widgetId || !BLOCKS.jint[c.widgetId]) continue;
      content += sec(BLOCKS.jint[c.widgetId].large(cfg, {width:'full', label: c.label}));
      continue;
    }
    const cols = row.cells.map(c => wToFr(c.width)).join(' ');
    const cellsHtml = row.cells.map(c => {
      if(c.widgetId && BLOCKS.jint[c.widgetId]){
        return BLOCKS.jint[c.widgetId].large(cfg, {width: c.width, label: c.label});
      }
      return '<div></div>'; // empty placeholder preserves grid space
    }).join('');
    content += sec(`<div style="display:grid;grid-template-columns:${cols};gap:20px;align-items:stretch">${cellsHtml}</div>`);
  }
  const I={
    waffle:`<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1.4" y="1.4" width="2.8" height="2.8" rx=".3"/><rect x="7.8" y="1.4" width="2.8" height="2.8" rx=".3"/><rect x="14.2" y="1.4" width="2.8" height="2.8" rx=".3"/><rect x="1.4" y="7.8" width="2.8" height="2.8" rx=".3"/><rect x="7.8" y="7.8" width="2.8" height="2.8" rx=".3"/><rect x="14.2" y="7.8" width="2.8" height="2.8" rx=".3"/><rect x="1.4" y="14.2" width="2.8" height="2.8" rx=".3"/><rect x="7.8" y="14.2" width="2.8" height="2.8" rx=".3"/><rect x="14.2" y="14.2" width="2.8" height="2.8" rx=".3"/></svg>`,
    bell:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
    people:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
    gear:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
    help:`<span class="jt-m365-help-q">?</span>`,
    globe:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    grid:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
    search:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
    plus:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    star:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
    copilot:`<img src="icons/Microsoft-Copilot-Logo.png" alt="Copilot" style="height:22px;width:auto;display:block">`,
    megaphone:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-7v16L3 13z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>`,
    searchOrange:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e8440a" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  };
  return `
<!-- M365 Suite Bar -->
<div class="jt-m365bar">
  <div class="jt-m365-left">
    <div class="jt-m365-waffle">${I.waffle}</div>
    <div class="jt-m365-logo-wrap">${cfg.logo?`<img src="${cfg.logo}" alt="" style="height:28px;max-width:120px;object-fit:contain;filter:brightness(0) invert(1)">`:`<span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px">${n}</span>`}</div>
    <span class="jt-m365-appname">SharePoint</span>
  </div>
  <div class="jt-m365-search">${I.searchOrange}<input placeholder="Rechercher sur ce site"></div>
  <div class="jt-m365-right">
    <div class="jt-m365-icon">${I.copilot}</div>
    <div class="jt-m365-icon">${I.megaphone}</div>
    <div class="jt-m365-icon">${I.people}</div>
    <div class="jt-m365-icon">${I.gear}</div>
    <div class="jt-m365-icon">${I.help}</div>
    <div class="jt-m365-user">Antoine Amiot</div>
    <div class="jt-m365-av">AA</div>
  </div>
</div>
<!-- App Bar: white column + grouped pill -->
<div class="jt-appbar">
  <div class="jt-ab-pill">
    ${[[I.globe,false],[I.grid,true],[I.plus,false]].map(([ico,a])=>`<div class="jt-ab-icon${a?' active':''}">${ico}</div>`).join('')}
  </div>
</div>
<!-- Site Header: two-row layout -->
<div class="jt-siteheader">
  <!-- Row 1: logo + title + full-width visual banner -->
  <div class="jt-sh-top">
    <div class="jt-sh-logo-wrap">${cfg.logo?`<img src="${cfg.logo}" alt="">`:`<span class="jt-sh-brand">${n}</span>`}</div>
    <div class="jt-sh-title">Jint - Intranet ${n}</div>
    <div class="jt-sh-banner">
      <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(255,255,255,0) 0%,color-mix(in srgb,var(--P) 5%,#fff) 100%)"></div>
      <div style="position:absolute;left:5%;top:-80%;width:55%;height:260%;background:radial-gradient(ellipse,color-mix(in srgb,var(--S) 22%,transparent),transparent 60%)"></div>
      <div style="position:absolute;left:38%;top:-50%;width:55%;height:200%;background:radial-gradient(ellipse,color-mix(in srgb,var(--P) 16%,transparent),transparent 60%)"></div>
      <div style="position:absolute;right:-4%;top:-30%;width:38%;height:160%;background:radial-gradient(ellipse,color-mix(in srgb,var(--P) 28%,transparent),transparent 60%)"></div>
    </div>
  </div>
  <!-- Separator -->
  <div class="jt-sh-sep"></div>
  <!-- Row 2: navigation + actions -->
  <nav class="jt-sh-nav">
    ${(()=>{
      const defaults=[
        {label:'Accueil',dropdown:false},
        {label:'Centre documentaire',dropdown:true},
        {label:'Nos directions',dropdown:true},
        {label:'Centre de news',dropdown:false},
      ];
      const entries=(cfg.navEntries&&Array.isArray(cfg.navEntries)&&cfg.navEntries.length)?cfg.navEntries:defaults;
      const all=entries.concat([{label:'<span style="color:var(--P);font-weight:600">Modifier</span>',dropdown:false}]);
      const chevSvg='<svg height="0.6em" width="0.9em" viewBox="0 0 12 7" fill="none" stroke="#605e5c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:0.05em"><polyline points="1 1 6 6 11 1"/></svg>';
      return all.map((entry,i)=>{
        const {label,dropdown,children}=entry;
        const hasChildren=Array.isArray(children)&&children.length>0;
        let flyout='';
        if(hasChildren){
          flyout=`<div class="jt-sh-dropdown">${children.map(c=>`<div class="jt-sh-dropdown-item">${(c||'').replace(/</g,'&lt;')}</div>`).join('')}</div>`;
        }
        return `<div class="jt-sh-nav-item${i===0?' active':''}"${hasChildren?' style="position:relative"':''}>${label}${dropdown?chevSvg:''}${flyout}</div>`;
      }).join('');
    })()}
    <div class="jt-sh-right">
      <div class="jt-sh-action">${I.star} Non suivi</div>
      <div class="jt-sh-action">${I.people} Accès aux sites</div>
    </div>
  </nav>
</div>
<!-- Shell / Content -->
<div class="jt-shell">
  ${content}
  <div style="height:40px"></div>
</div>`;
}
}

}; // end TECHS

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
(function(){
  let cfg=null;
  try{cfg=JSON.parse(localStorage.getItem('tpl_cfg')||'null');}catch(e){}
  if(!cfg) cfg={technology:'lumapps',colors:{primary:'#E8440A',secondary:'#1A1A2E',text:'#1A1A1A'},name:'My Intranet',feeling:'Modern',logo:null};

  function hexToRgb(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  const [pr,pg,pb]=hexToRgb(cfg.colors.primary);
  const [sr,sg,sb]=hexToRgb(cfg.colors.secondary);
  const root=document.documentElement;
  root.style.setProperty('--P',cfg.colors.primary);
  root.style.setProperty('--S',cfg.colors.secondary);
  root.style.setProperty('--T',cfg.colors.text);
  root.style.setProperty('--P10',`rgba(${pr},${pg},${pb},.10)`);
  root.style.setProperty('--P20',`rgba(${pr},${pg},${pb},.20)`);
  root.style.setProperty('--P40',`rgba(${pr},${pg},${pb},.40)`);

  const techId=(cfg.technology||'lumapps').toLowerCase();
  const tech=TECHS[techId]||TECHS.lumapps;
  document.getElementById('tech-css').textContent=tech.css;
  document.body.classList.add('t-'+techId);
  document.title=(cfg.name||'Intranet')+' — '+tech.name;
  document.getElementById('app').innerHTML=tech.render(cfg);

  // Directory search + filter
  window._dirFilter=function(el){
    const w=el.closest('[data-dir-widget]');
    if(!w.dataset.initH) w.dataset.initH=w.offsetHeight;
    w.style.minHeight=w.dataset.initH+'px';
    const search=w.querySelector('[data-dir-search]').value.toLowerCase().trim();
    const activeChip=w.querySelector('[data-dir-chip][data-active="1"]');
    const activeTitle=activeChip?activeChip.dataset.dirChip.toLowerCase():null;
    let count=0;
    w.querySelectorAll('[data-dir-card]').forEach(card=>{
      const matchSearch=!search||card.dataset.dirName.toLowerCase().includes(search);
      const matchChip=!activeTitle||card.dataset.dirTitle.toLowerCase().includes(activeTitle);
      const show=matchSearch&&matchChip;
      card.style.display=show?'flex':'none';
      if(show)count++;
    });
    w.querySelector('[data-dir-count]').textContent=count+' personne'+(count>1?'s':'')+' trouvée'+(count>1?'s':'');
  };
  window._dirChip=function(chip){
    const w=chip.closest('[data-dir-widget]');
    const wasActive=chip.dataset.active==='1';
    w.querySelectorAll('[data-dir-chip]').forEach(c=>{
      c.dataset.active='0';
      c.style.background='transparent';
      c.style.color='var(--P)';
    });
    if(!wasActive){
      chip.dataset.active='1';
      chip.style.background='var(--P)';
      chip.style.color='#fff';
    }
    window._dirFilter(chip);
  };

  // Events carousel navigation
  window._evNav=function(btn,dir){
    const w=btn.closest('[data-ev-widget]');
    const total=+w.dataset.pages;
    let p=(+w.dataset.page+dir+total)%total;
    w.dataset.page=p;
    w.querySelector('[data-ev-track]').style.transform=`translateX(-${p*100}%)`;
    w.querySelectorAll('[data-ev-dot]').forEach((d,i)=>{
      d.style.width=i===p?'20px':'6px';
      d.style.background=i===p?'rgba(0,0,0,.45)':'rgba(0,0,0,.18)';
    });
    const prev=w.querySelector('[data-ev-prev]');
    const next=w.querySelector('[data-ev-next]');
    const dis=(el,off)=>{el.style.opacity=off?'.3':'1';el.style.pointerEvents=off?'none':'auto';};
    dis(prev,p===0);
    dis(next,p===total-1);
  };

  // Contacts carousel navigation
  window._ctNav=function(btn,dir){
    const w=btn.closest('[data-ct-widget]');
    const total=+w.dataset.pages;
    let p=(+w.dataset.page+dir+total)%total;
    w.dataset.page=p;
    w.querySelector('[data-ct-track]').style.transform=`translateX(-${p*100}%)`;
    w.querySelectorAll('[data-ct-dot]').forEach((d,i)=>{
      d.style.width=i===p?'20px':'6px';
      d.style.background=i===p?'rgba(0,0,0,.45)':'rgba(0,0,0,.18)';
    });
    const prev=w.querySelector('[data-ct-prev]');
    const next=w.querySelector('[data-ct-next]');
    const dis=(el,off)=>{el.style.opacity=off?'.3':'1';el.style.pointerEvents=off?'none':'auto';};
    dis(prev,p===0);
    dis(next,p===total-1);
  };

  // Apps carousel navigation
  window._appsNav=function(btn,dir){
    const w=btn.closest('[data-apps-widget]');
    const total=+w.dataset.pages;
    let p=(+w.dataset.page+dir+total)%total;
    w.dataset.page=p;
    w.querySelector('[data-apps-track]').style.transform=`translateX(-${p*100}%)`;
    w.querySelectorAll('[data-dot]').forEach((d,i)=>{
      d.style.width=i===p?'20px':'6px';
      d.style.background=i===p?'rgba(255,255,255,.9)':'rgba(255,255,255,.35)';
    });
    const prev=w.querySelector('[data-apps-prev]');
    const next=w.querySelector('[data-apps-next]');
    const disable=(el,off)=>{el.style.opacity=off?'.3':'1';el.style.pointerEvents=off?'none':'auto';};
    disable(prev, p===0);
    disable(next, p===total-1);
  };

  // Back link
  const back=document.createElement('a');
  back.href='index.html';
  back.style.cssText='position:fixed;bottom:20px;right:20px;background:#111;color:#fff;font-size:12px;font-weight:600;padding:8px 14px;border-radius:20px;z-index:9999;text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.3);font-family:Inter,sans-serif;opacity:.75';
  back.textContent='← Templatizer';
  back.onmouseenter=()=>back.style.opacity='1';
  back.onmouseleave=()=>back.style.opacity='.75';
  document.body.appendChild(back);
})();
</script>
</body>
</html>
